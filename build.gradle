plugins {
    id 'java'
}

group = 'com.bajingloncat'
version = '2.0.0'

repositories {
    mavenCentral()
}

dependencies {
    implementation group: 'org.json', name: 'json', version: '20230618'
    implementation 'org.brotli:dec:0.1.2'
}

jar {
    manifest {
        attributes 'Main-Class': 'com.bajingloncat.Main'
    }

    from {
        configurations.runtimeClasspath.collect { it.isDirectory() ? it : zipTree(it) }
    }

    archiveFileName = 'bajing-loncat.jar'
}